<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色彩记忆游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎨 色彩记忆游戏</h1>
    
    <div class="scores">
      <div class="score-item">
        <span class="score-label">当前关卡</span>
        <span id="current-level" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">最高记录</span>
        <span id="high-score" class="score-value">0</span>
      </div>
    </div>

    <div id="game-status" class="game-status">点击开始按钮开始游戏</div>

    <div class="game-board">
      <button class="color-btn red" data-color="red"></button>
      <button class="color-btn yellow" data-color="yellow"></button>
      <button class="color-btn blue" data-color="blue"></button>
      <button class="color-btn green" data-color="green"></button>
    </div>

    <div class="controls">
      <button id="start-btn" class="start-btn">开始游戏</button>
    </div>

    <div id="save-modal" class="save-modal">
      <div class="save-modal-content">
        <h2>📂 发现未完成的游戏</h2>
        <p>你有一局未完成的游戏，当前进度：<span id="saved-level" class="saved-level">0</span> 关</p>
        <p>是否继续上一局？</p>
        <div class="save-modal-buttons">
          <button id="resume-btn" class="modal-btn resume-btn">继续游戏</button>
          <button id="abandon-btn" class="modal-btn abandon-btn">放弃存档</button>
        </div>
      </div>
    </div>

    <div class="instructions">
      <h3>游戏规则</h3>
      <p>1. 观察亮起的按钮顺序</p>
      <p>2. 按相同顺序点击按钮</p>
      <p>3. 每过一关，序列增加一个</p>
      <p>4. 按错一次即游戏结束</p>
    </div>
  </div>

  <script type="module" src="game.ts"></script>
</body>
</html>
